<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WET Hostel Price Comparison</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏷️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        input[type="date"], select, textarea, input[type="number"] {
            color-scheme: dark;
        }
        .header-main { font-size: 30px; line-height: 1; }
        .search-input { font-size: 24px !important; }
        .label-text { font-size: 16px; }
        .parser-textarea { font-size: 10px !important; line-height: 1.1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #db2777; border-radius: 10px; }
        .tab-active { border-bottom: 4px solid #db2777; color: #f8fafc; }
        .tab-inactive { color: #64748b; }
    </style>
</head>
<body class="p-1 md:p-3">

    <div class="max-w-xl mx-auto pb-12">
        <header class="mb-4 text-center">
            <h1 class="header-main font-black text-pink-500 uppercase tracking-tighter">WET Pool Party</h1>
            <p class="text-[11px] text-slate-500 uppercase tracking-[0.3em] font-bold">Pricing & Audit Tool</p>
        </header>

        <!-- TABS -->
        <div class="flex border-b border-slate-800 mb-4 px-2">
            <button onclick="switchTab('quote')" id="tab-quote" class="flex-1 py-3 font-black text-sm uppercase tracking-widest tab-active">Quote</button>
            <button onclick="switchTab('audit')" id="tab-audit" class="flex-1 py-3 font-black text-sm uppercase tracking-widest tab-inactive">Market Audit</button>
        </div>

        <!-- TAB 1: QUOTE SECTION -->
        <div id="view-quote" class="block space-y-3">
            <div class="glass-card rounded-xl p-2">
                <div class="grid grid-cols-12 gap-2 items-end">
                    <div class="col-span-4">
                        <label class="block label-text font-black mb-0 text-slate-400 uppercase tracking-tighter">In</label>
                        <input type="date" id="checkin" onchange="handleDateChange('in')" class="search-input w-full bg-slate-900 border border-slate-700 rounded-lg px-1 py-0 text-white outline-none focus:border-pink-500 leading-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block label-text font-black mb-0 text-slate-400 uppercase text-center tracking-tighter">Nights</label>
                        <input type="number" id="nights" value="1" min="1" oninput="handleDateChange('nights')" class="search-input w-full bg-slate-900 border border-slate-700 rounded-lg px-1 py-0 text-white outline-none focus:border-pink-500 text-center leading-none">
                    </div>
                    <div class="col-span-4">
                        <label class="block label-text font-black mb-0 text-slate-400 uppercase tracking-tighter text-right pr-1">Out</label>
                        <input type="date" id="checkout" onchange="handleDateChange('out')" class="search-input w-full bg-slate-900 border border-slate-700 rounded-lg px-1 py-0 text-white outline-none focus:border-pink-500 leading-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block label-text font-black mb-0 text-slate-400 uppercase text-center tracking-tighter">Guests</label>
                        <input type="number" id="guests" value="1" min="1" max="99" class="search-input w-full bg-slate-900 border border-slate-700 rounded-lg px-1 py-0 text-white outline-none focus:border-pink-500 text-center leading-none">
                    </div>
                </div>
                <button onclick="generateLinks()" class="w-full mt-2 bg-pink-600 hover:bg-pink-500 text-white font-black py-0.5 rounded-lg transition-all text-xl uppercase tracking-widest shadow-lg active:scale-95">Run Search</button>
            </div>

            <div id="resultsArea" class="hidden">
                <div class="grid grid-cols-3 gap-1.5">
                    <a id="linkBooking" target="_blank" onclick="prepParserFocus('pasteArea')" class="glass-card py-0.5 px-1 rounded-xl border border-slate-700 flex flex-col items-center justify-center hover:bg-slate-800 transition">
                        <span class="label-text font-black text-blue-400 uppercase text-center leading-none">Booking.com</span>
                        <span class="text-[11px] font-bold text-slate-400 uppercase leading-none">Open</span>
                    </a>
                    <a id="linkHW" target="_blank" onclick="prepParserFocus('pasteArea')" class="glass-card py-0.5 px-1 rounded-xl border border-slate-700 flex flex-col items-center justify-center hover:bg-slate-800 transition">
                        <span class="label-text font-black text-orange-400 uppercase text-center leading-none">Hostelworld</span>
                        <span class="text-[11px] font-bold text-slate-400 uppercase leading-none">Open</span>
                    </a>
                    <div class="glass-card py-0.5 px-1 rounded-xl border border-slate-700 flex flex-col items-center justify-center relative overflow-hidden">
                        <span class="label-text font-black text-green-400 uppercase text-center leading-none tracking-tighter">Direct</span>
                        <a href="https://inbox.myallocator.com/booknow/-sxO1cCV5jLMwqZTXY629A" target="_blank" class="text-[11px] font-bold text-slate-400 underline decoration-green-500/50 uppercase leading-none">Open Engine</a>
                        <button onclick="copyDatesToClipboard()" class="absolute bottom-0 right-0 bg-slate-700 p-0.5 rounded-tl-md text-[10px]">📋</button>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-xl border border-blue-500/30 overflow-hidden">
                <div class="px-3 py-1 bg-blue-900/20 border-b border-blue-500/30 flex justify-between items-center">
                    <h3 class="label-text font-black text-blue-400 uppercase tracking-widest">WET Comparison Parser</h3>
                    <button onclick="clearComparison()" class="text-[10px] text-slate-500 uppercase hover:text-white font-bold">Reset</button>
                </div>
                <div class="p-2">
                    <textarea id="pasteArea" rows="1" placeholder="Paste listing text here (B.com or HW)..." class="parser-textarea w-full bg-slate-900 border border-slate-700 rounded-lg p-1 text-slate-400 outline-none focus:border-blue-500 transition mb-1.5 h-10"></textarea>
                    <button onclick="smartParse()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-0.5 rounded-lg text-lg uppercase tracking-widest transition shadow-lg">Merge & Compare</button>
                    <div id="comparisonResults" class="hidden mt-2 space-y-1"></div>
                </div>
            </div>

            <div class="glass-card rounded-xl border border-green-500/30 p-2 px-3">
                 <div class="flex items-center gap-4">
                    <div class="w-1/2">
                        <label class="block label-text font-black mb-0 text-slate-400 uppercase tracking-tight">Discounter</label>
                        <input type="number" id="otaPrice" placeholder="Price" oninput="calculateDiscount()" class="search-input w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-0.5 font-black text-white outline-none leading-none">
                    </div>
                    <div class="w-1/2 text-right border-l border-slate-700 pl-4">
                        <div class="label-text font-black text-green-500 uppercase mb-0 tracking-tighter text-base">Direct Quote (-10%)</div>
                        <div class="text-[36px] font-black text-white leading-none" id="discountResult">--</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB 2: AUDIT & MATRIX SECTION -->
        <div id="view-audit" class="hidden space-y-4">
            <div class="glass-card rounded-xl border border-pink-500/20 overflow-hidden">
                <div class="px-3 py-1 bg-pink-900/20 border-b border-pink-500/30 flex justify-between items-center">
                    <h3 class="label-text font-black text-pink-400 uppercase tracking-widest">FMP Audit Matrix</h3>
                    <button onclick="toggleSettings()" class="text-xs text-slate-500 hover:text-white uppercase font-bold">Edit Dates</button>
                </div>
                <div id="matrixMain" class="p-2 text-center">
                    <select id="fmSelector" onchange="runMatrixFromSelect()" class="w-[55%] bg-slate-900 border border-slate-700 rounded-lg p-0.5 text-lg text-white outline-none focus:border-pink-500 cursor-pointer font-black appearance-none text-center mb-1">
                        <option value="">-- SELECT DATE --</option>
                    </select>
                    <div id="matrixResults" class="hidden space-y-1"></div>
                </div>
                <div id="matrixSettings" class="hidden p-2 bg-slate-900 border-t border-slate-700">
                    <textarea id="fmDateRaw" rows="4" class="parser-textarea w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-slate-500 mb-2"></textarea>
                    <button onclick="saveDates()" class="w-full bg-slate-700 text-xs py-0.5 rounded-lg font-black hover:bg-green-700 transition uppercase">Save DB</button>
                </div>
            </div>

            <div class="glass-card rounded-xl border border-orange-500/30 overflow-hidden">
                <div class="px-3 py-1 bg-orange-900/20 border-b border-orange-500/30 flex justify-between items-center">
                    <h3 class="label-text font-black text-orange-400 uppercase tracking-widest">Competitive Audit Parser</h3>
                    <button onclick="document.getElementById('auditArea').value=''; document.getElementById('auditResults').classList.add('hidden')" class="text-[10px] text-slate-500 uppercase hover:text-white font-bold">Clear</button>
                </div>
                <div class="p-2">
                    <textarea id="auditArea" rows="1" placeholder="Paste Search Results text here..." class="parser-textarea w-full bg-slate-900 border border-slate-700 rounded-lg p-1 text-slate-400 outline-none focus:border-orange-500 transition mb-1.5 h-10"></textarea>
                    <button onclick="auditParse()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-0.5 rounded-lg text-lg uppercase tracking-widest transition shadow-lg">Analyze Market</button>
                    <div id="auditResults" class="hidden mt-3 space-y-1 max-h-[650px] overflow-y-auto pr-1"></div>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center text-slate-600 text-[14px] uppercase tracking-[0.4em] font-bold pb-4">
            WET Hostel • Wild Wandering
        </footer>
    </div>

    <script>
        const DEFAULT_DATES = `2026-01-03 | 3 Jan\n2026-02-02 | 2 Feb\n2026-03-03 | 3 Mar\n2026-04-02 | 2 Apr\n2026-05-01 | 1 May\n2026-06-01 | 1 June\n2026-06-29 | 29 Jun\n2026-07-31 | 31 Jul\n2026-08-28 | 28 Aug\n2026-09-26 | 26 Sep\n2026-10-27 | 27 Oct\n2026-11-24 | 24 Nov\n2026-12-24 | 24 Dec\n2026-12-31 | 31 Dec`;
        
        const OPERATIONAL_MAP = [
            { id: "Female Dorm", anchors: ["Female Dorm", "Female-Only"] },
            { id: "Budget Dorm", anchors: ["Bunk Bed in Mixed Dormitory", "Basic 8 Bed Mixed"] },
            { id: "Standard Dorm", anchors: ["Single Bed in Mixed Dormitory", "Standard 8 Bed Mixed"] },
            { id: "Superior Dorm", anchors: ["Single Bed in Dormitory Room", "Deluxe 8 Bed Mixed"] },
            { id: "Dorm for Private Use", anchors: ["8-Bed Mixed Dormitory Room", "Superior 8 Bed Family"] },
            { id: "Chill Dorm", anchors: ["Superior 8 Bed Mixed"] }
        ];

        let comparisonState = {};
        let stayNights = 1;
        const fDate = (date) => date.toISOString().split('T')[0];

        window.onload = () => {
            const today = new Date();
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('checkin').value = fDate(today);
            document.getElementById('checkout').value = fDate(tomorrow);
            updateStayNights();
            const saved = localStorage.getItem('wet_fm_dates') || DEFAULT_DATES;
            document.getElementById('fmDateRaw').value = saved;
            populateDropdown(saved);
        };

        function switchTab(view) {
            ['quote', 'audit'].forEach(v => {
                document.getElementById('view-' + v).classList.add('hidden');
                document.getElementById('tab-' + v).classList.replace('tab-active', 'tab-inactive');
            });
            document.getElementById('view-' + view).classList.remove('hidden');
            document.getElementById('tab-' + view).classList.replace('tab-inactive', 'tab-active');
        }

        function handleDateChange(type) {
            const cinEl = document.getElementById('checkin');
            const coutEl = document.getElementById('checkout');
            const nightsEl = document.getElementById('nights');
            
            let cin = new Date(cinEl.value);
            let cout = new Date(coutEl.value);
            let nights = parseInt(nightsEl.value) || 1;

            if (type === 'in') {
                // If user changes IN, keep the number of nights same, move OUT forward
                const newOut = new Date(cin);
                newOut.setDate(cin.getDate() + nights);
                coutEl.value = fDate(newOut);
            } else if (type === 'nights') {
                // If user changes nights, keep IN, move OUT
                if (nights < 1) nights = 1;
                const newOut = new Date(cin);
                newOut.setDate(cin.getDate() + nights);
                coutEl.value = fDate(newOut);
            } else if (type === 'out') {
                // If user changes OUT, keep IN, update nights
                if (cout <= cin) {
                    const nextDay = new Date(cin);
                    nextDay.setDate(cin.getDate() + 1);
                    coutEl.value = fDate(nextDay);
                    cout = nextDay;
                }
                const diffTime = Math.abs(cout - cin);
                nights = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                nightsEl.value = nights;
            }
            updateStayNights();
        }

        function updateStayNights() {
            const cinV = document.getElementById('checkin').value, coutV = document.getElementById('checkout').value;
            if (!cinV || !coutV) return;
            const d1 = new Date(cinV), d2 = new Date(coutV);
            const utc1 = Date.UTC(d1.getFullYear(), d1.getMonth(), d1.getDate());
            const utc2 = Date.UTC(d2.getFullYear(), d2.getMonth(), d2.getDate());
            stayNights = Math.floor((utc2 - utc1) / (1000 * 60 * 60 * 24)) || 1;
            document.getElementById('nights').value = stayNights;
        }

        function smartParse() {
            const text = document.getElementById('pasteArea').value;
            if (!text) return;
            
            const isHW = text.toLowerCase().includes("hostelworld") || text.includes("per bed") || text.includes("Standard 8 Bed Female");
            const cleanText = text.replace(/[\u00A0\u1680\u180E\u2000-\u200B\u202F\u205F\u3000\uFEFF]/g, " ").replace(/\s+/g, ' ');

            OPERATIONAL_MAP.forEach(room => {
                room.anchors.forEach(anchor => {
                    const regex = new RegExp(anchor.replace(/\s+/g, '\\s+'), 'gi');
                    let match;
                    while ((match = regex.exec(cleanText)) !== null) {
                        const chunk = cleanText.substring(match.index, match.index + 1200);
                        const prices = [...chunk.matchAll(/THB\s*([\d,.]+)/gi)].map(p => parseFloat(p[1].replace(/,/g, '')));
                        
                        if (prices.length > 0) {
                            // Find the minimum price in this specific block
                            const minValInBlock = Math.min(...prices);
                            const total = isHW ? (minValInBlock * stayNights) : minValInBlock;
                            const finalPrice = Math.round(total);

                            if (!comparisonState[room.id]) comparisonState[room.id] = {};
                            const currentBest = comparisonState[room.id][isHW ? 'hw' : 'booking'] || 9e9;
                            
                            // CHEAPEST PRICE LOGIC: Only update if the new price is lower than what we already have for this room
                            comparisonState[room.id][isHW ? 'hw' : 'booking'] = Math.min(currentBest, finalPrice);
                        }
                    }
                });
            });

            renderComparison();
            document.getElementById('pasteArea').value = '';
        }

        function renderComparison() {
            const container = document.getElementById('comparisonResults');
            container.innerHTML = ''; container.classList.remove('hidden');
            const sortedKeys = Object.keys(comparisonState).sort((a,b) => (comparisonState[a].booking || comparisonState[a].hw || 9e9) - (comparisonState[b].booking || comparisonState[b].hw || 9e9));
            sortedKeys.forEach(room => {
                const data = comparisonState[room];
                const otaMin = Math.min(...[data.booking, data.hw].filter(v => v));
                const direct = Math.round(otaMin * 0.9);
                const row = document.createElement('div');
                row.className = 'flex items-center bg-slate-900 border border-slate-700 p-1.5 rounded-lg gap-1 mb-1 shadow-inner';
                row.innerHTML = `
                    <div class="w-[34%] font-black text-[16px] text-slate-200 truncate uppercase tracking-tighter leading-none">${room}</div>
                    <div class="flex-1 flex flex-col items-center border-l border-slate-800"><span class="text-[8px] text-blue-400 font-black uppercase">B.COM</span><span class="text-sm text-slate-400">${data.booking ? '฿'+data.booking.toLocaleString() : '-'}</span></div>
                    <div class="flex-1 flex flex-col items-center border-l border-slate-800"><span class="text-[8px] text-orange-400 font-black uppercase">HW</span><span class="text-sm text-slate-400">${data.hw ? '฿'+data.hw.toLocaleString() : '-'}</span></div>
                    <div class="flex-1 flex flex-col items-center border-l border-slate-800"><span class="text-[8px] text-green-500 font-black uppercase">DIRECT</span><span class="font-black text-[18px] text-white leading-none">฿${direct.toLocaleString()}</span></div>`;
                container.appendChild(row);
            });
        }

        function auditParse() {
            const rawText = document.getElementById('auditArea').value;
            const container = document.getElementById('auditResults');
            if (!rawText) return;
            container.innerHTML = ''; container.classList.remove('hidden');

            let text = rawText;
            if (text.includes("Things to do in Haad Rin")) {
                const parts = text.split("Things to do in Haad Rin");
                const afterAds = parts[1].split("Load more results")[1] || "";
                text = parts[0] + afterAds;
            }
            
            if (text.includes("Available properties you recently viewed")) {
                text = text.split("Available properties you recently viewed")[0];
            } else if (text.includes("Recently viewed")) {
                text = text.split("Recently viewed")[0];
            }

            const results = [];
            const isHW = text.toLowerCase().includes("hostelworld") || text.toLowerCase().includes("dorms from");

            if (isHW) {
                const blocks = text.split(/\nHostel\n/);
                blocks.forEach((block, index) => {
                    if (index === 0 && !block.trim().startsWith('Hostel')) return; 
                    const lines = block.trim().split('\n');
                    let name = lines[0].trim();
                    if (!isNaN(name) || name.length < 3) name = lines[1]?.trim() || "Unknown";
                    if (name.includes('Tour') || name.includes('Experience') || name.includes('Safari') || block.includes('Tickets from')) return;
                    const prices = [...block.matchAll(/(?<!\+)\s*THB\s*([\d,.]+)/gi)].map(p => parseFloat(p[1].replace(/,/g, '')));
                    if (name && prices.length > 0) results.push({ name, price: Math.min(...prices) });
                });
            } else {
                const segments = text.split("Opens in new window");
                for (let i = 0; i < segments.length - 1; i++) {
                    const nameBlock = segments[i].trim().split('\n');
                    const name = nameBlock[nameBlock.length - 1].trim();
                    if (name.includes('Safari') || name.includes('Experience') || name.includes('Tour') || 
                        name.includes('Things to do') || name.includes('Tickets') || name.length < 3) continue;

                    let dataBlock = segments[i+1];
                    if (dataBlock.includes("Things to do in Haad Rin")) {
                        dataBlock = dataBlock.split("Things to do in Haad Rin")[0];
                    }

                    const matches = [...dataBlock.matchAll(/(?<!\+)\s*THB\s*([\d,.]+)/gi)];
                    
                    if (name && matches.length > 0) {
                        const prices = matches.map(p => parseFloat(p[1].replace(/,/g, '')));
                        const cheapest = Math.min(...prices);
                        results.push({ name, price: cheapest });
                    }
                }
            }

            const seenNames = new Set();
            results.sort((a,b) => a.price - b.price).forEach(item => {
                if (seenNames.has(item.name)) return;
                seenNames.add(item.name);
                
                const lowerName = item.name.toLowerCase();
                const isWET = lowerName.includes('wet pool') || lowerName.includes('wet!');
                const row = document.createElement('div');
                row.className = `flex justify-between p-1.5 px-2 border border-slate-800 rounded text-sm mb-1 ${isWET ? 'bg-pink-900/30 border-pink-500/50 shadow-[0_0_10px_rgba(219,39,119,0.2)]' : 'bg-slate-900/50'}`;
                row.innerHTML = `<span class="font-bold truncate max-w-[280px] ${isWET ? 'text-pink-400 font-black' : 'text-slate-300'}">${item.name}</span><span class="font-mono text-slate-400">฿${Math.round(item.price).toLocaleString()}</span>`;
                container.appendChild(row);
            });
        }

        function clearComparison() { comparisonState = {}; document.getElementById('comparisonResults').classList.add('hidden'); }
        function prepParserFocus(id) { setTimeout(() => { const el = document.getElementById(id); el.focus(); el.scrollIntoView({behavior:'smooth', block:'center'}); }, 500); }
        function calculateDiscount() { const val = document.getElementById('otaPrice').value; document.getElementById('discountResult').innerText = val ? Math.round(val * 0.9).toLocaleString() : "--"; }

        function generateLinks() {
            const cin = document.getElementById('checkin').value, cout = document.getElementById('checkout').value, gst = document.getElementById('guests').value;
            if (!cin || !cout) return;
            document.getElementById('linkBooking').href = `https://www.booking.com/hotel/th/wet-pool-party-haad-rin.html?checkin=${cin}&checkout=${cout}&group_adults=${gst}&group_children=0&no_rooms=1`;
            document.getElementById('linkHW').href = `https://www.hostelworld.com/pwa/hosteldetails.php/WET-a-Pool-Party-Hostel-by-Wild-Wandering/Koh-Phangan/313418?from=${cin}&to=${cout}&guests=${gst}`;
            document.getElementById('resultsArea').classList.remove('hidden');
        }

        function runMatrixFromSelect() {
            const dateStr = document.getElementById('fmSelector').value, gst = document.getElementById('guests').value, container = document.getElementById('matrixResults');
            if (!dateStr) return; container.innerHTML = ''; container.classList.remove('hidden');
            const partyDate = new Date(dateStr);
            [{label:"1 Nt", in:0, out:1}, {label:"2 Nt", in:-1, out:1}, {label:"3 Nt", in:-1, out:2}, {label:"4 Nt", in:-2, out:2}, {label:"5 Nt", in:-2, out:3}].forEach(p => {
                const cin = new Date(partyDate); cin.setDate(partyDate.getDate() + p.in);
                const cout = new Date(partyDate); cout.setDate(partyDate.getDate() + p.out);
                const cinS = fDate(cin), coutS = fDate(cout);
                const bcom = `https://www.booking.com/searchresults.html?aid=304142&ss=Haad+Rin&dest_id=900050772&dest_type=city&checkin=${cinS}&checkout=${coutS}&group_adults=${gst}&no_rooms=1&group_children=0&order=price`;
                const hw = `https://www.hostelworld.com/pwa/s?q=Koh%20Phangan,%20Thailand&country=Thailand&city=Koh%20Phangan&type=city&id=2017&from=${cinS}&to=${coutS}&guests=${gst}&district=232&page=1&sort=lowestprice`;
                const row = document.createElement('div');
                row.className = 'flex items-center gap-1 bg-slate-900 border border-slate-700 p-0.5 px-1 rounded-lg shadow-sm';
                row.innerHTML = `<div class="w-10 font-black text-pink-500 text-xl leading-none">${p.label}</div><div class="flex-grow text-slate-400 text-base font-black font-mono text-center border-l border-slate-800">${cinS.slice(5)} to ${coutS.slice(5)}</div><div class="flex gap-1"><a href="${bcom}" target="_blank" onclick="prepParserFocus('auditArea')" class="w-14 py-1 bg-blue-600 rounded text-[10px] text-white font-black uppercase leading-none text-center">B.com</a><a href="${hw}" target="_blank" onclick="prepParserFocus('auditArea')" class="w-14 py-1 bg-orange-600 rounded text-[10px] text-white font-black uppercase leading-none text-center">HW</a></div>`;
                container.appendChild(row);
            });
        }

        function populateDropdown(raw) {
            const select = document.getElementById('fmSelector');
            select.innerHTML = '<option value="">-- SELECT DATE --</option>';
            raw.trim().split('\n').forEach(line => {
                const [date, name] = line.split('|').map(s => s.trim());
                if(date && name) { const opt = document.createElement('option'); opt.value = date; opt.textContent = name.toUpperCase(); select.appendChild(opt); }
            });
        }
        function toggleSettings() { document.getElementById('matrixSettings').classList.toggle('hidden'); }
        function saveDates() { localStorage.setItem('wet_fm_dates', document.getElementById('fmDateRaw').value); populateDropdown(document.getElementById('fmDateRaw').value); toggleSettings(); }
        function copyDatesToClipboard() { const cin = document.getElementById('checkin').value, cout = document.getElementById('checkout').value, dummy = document.createElement("textarea"); document.body.appendChild(dummy); dummy.value = `In: ${cin} | Out: ${cout}`; dummy.select(); document.execCommand("copy"); document.body.removeChild(dummy); }
    </script>
    <script src="https://loren-6q.github.io/WETNav/nav.js"></script>
</body>
